<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 浙传校园交易广场</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header th:replace="~{fragments/site-nav :: header(true)}"></header>

<main class="container narrow">
    <div class="notice" th:if="${message}" th:text="${message}">提示</div>
    <div class="notice error-notice" th:if="${param.error}">用户名或密码错误，请重试。</div>
    <div class="notice" th:if="${param.logout}">你已安全退出登录。</div>

    <section class="form-card">
        <p class="eyebrow">Account</p>
        <h1>登录账号</h1>
        <p class="muted">登录后可发布商品、代课信息，并使用微信支付。</p>

        <form class="publish-form" th:action="@{/login}" method="post">
            <label>
                用户名
                <input type="text" name="username" autocomplete="username" placeholder="3-30 个字符" required>
            </label>
            <label>
                密码
                <input type="password" name="password" autocomplete="current-password" placeholder="至少 6 个字符" required>
            </label>
            <div class="actions">
                <a class="button button-light" th:href="@{/register}">注册账号</a>
                <button class="button button-primary" type="submit">登录</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
