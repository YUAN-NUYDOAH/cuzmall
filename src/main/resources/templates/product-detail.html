<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.title} + ' - 浙传校园交易广场'">商品详情</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header th:replace="~{fragments/site-nav :: header(true)}"></header>

<main class="container narrow">
    <div class="notice" th:if="${message}" th:text="${message}">发布成功</div>
    <div class="notice error-notice" th:if="${paymentError}" th:text="${paymentError}">支付提示</div>

    <article class="detail-card">
        <div class="card-topline">
            <span class="tag" th:text="${product.category.displayName}">数码设备</span>
            <span class="status" th:text="${product.status.displayName}">在售</span>
        </div>

        <div class="product-image-wrap" th:if="${product.imagePath}">
            <img class="product-detail-image" th:src="${product.imagePath}" th:alt="${product.title}">
        </div>
        <div class="product-image-placeholder" th:if="${product.imagePath == null}">暂无商品图片</div>

        <h1 th:text="${product.title}">商品标题</h1>
        <div class="price large" th:text="|￥${product.price}|">￥100</div>
        <p class="description" th:text="${product.description}">商品描述</p>

        <dl class="detail-list">
            <div>
                <dt>交易地点</dt>
                <dd th:text="${product.location}">浙江传媒学院</dd>
            </div>
            <div>
                <dt>卖家</dt>
                <dd th:text="${product.sellerName}">同学</dd>
            </div>
            <div>
                <dt>联系方式</dt>
                <dd th:text="${product.contact}">微信</dd>
            </div>
            <div>
                <dt>发布时间</dt>
                <dd th:text="${#temporals.format(product.createdAt, 'yyyy-MM-dd HH:mm')}">2026-04-27 09:00</dd>
            </div>
        </dl>

        <div class="safe-tip">
            <strong>交易提醒：</strong>建议优先选择校内公共区域面交，确认商品状态后再付款。
        </div>

        <section class="payment-panel">
            <div>
                <p class="eyebrow">Wechat Pay</p>
                <h2>微信扫码支付</h2>
                <p class="muted" th:if="${wechatPayConfigured}">生成微信支付二维码后，用微信扫码完成付款。</p>
                <p class="muted" th:if="${!wechatPayConfigured}">微信支付商户参数尚未配置，配置环境变量后即可启用真实支付。</p>
            </div>
            <p class="muted sold-tip" th:if="${product.status.name() != 'ON_SALE'}">该商品已售出或不可购买，无法发起支付。</p>
            <form th:action="@{/products/{id}/payments/wechat(id=${product.id})}" method="post"
                  th:if="${product.status.name() == 'ON_SALE'}">
                <button class="button button-primary" type="submit" th:disabled="${!wechatPayConfigured}">微信支付</button>
            </form>
        </section>

        <div class="actions">
            <a class="button button-light" th:href="@{/}">返回交易广场</a>
            <a class="button button-primary" th:href="@{/publish}">继续发布</a>
        </div>
    </article>
</main>
</body>
</html>
