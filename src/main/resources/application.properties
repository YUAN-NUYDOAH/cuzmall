spring.application.name=school-transaction
server.port=${PORT:8023}
server.forward-headers-strategy=framework
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

app.upload.directory=${UPLOAD_DIR:./data/uploads}
app.upload.max-size-bytes=5242880

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:school_transaction_db_local}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

wechat.pay.app-id=${WECHAT_PAY_APP_ID:}
wechat.pay.mch-id=${WECHAT_PAY_MCH_ID:}
wechat.pay.api-v3-key=${WECHAT_PAY_API_V3_KEY:}
wechat.pay.merchant-serial-number=${WECHAT_PAY_MERCHANT_SERIAL_NUMBER:}
wechat.pay.private-key-path=${WECHAT_PAY_PRIVATE_KEY_PATH:}
wechat.pay.notify-url=${WECHAT_PAY_NOTIFY_URL:}
