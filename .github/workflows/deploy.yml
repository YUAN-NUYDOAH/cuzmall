name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_NAME: cuzmall
  IMAGE_NAME: cuzmall

jobs:
  deploy:
    name: Build and deploy Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn -B test

      - name: Build Docker image
        run: |
          docker build -t "${IMAGE_NAME}:${GITHUB_SHA}" .
          docker save "${IMAGE_NAME}:${GITHUB_SHA}" | gzip > app-image.tar.gz

      - name: Prepare SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
        run: |
          test -n "${SSH_PRIVATE_KEY}"
          test -n "${SERVER_HOST}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SERVER_PORT}" "${SERVER_HOST}" >> ~/.ssh/known_hosts

      - name: Upload image to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/cuzmall' }}
        run: |
          test -n "${SERVER_USER}"
          ssh -i ~/.ssh/deploy_key -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" "mkdir -p '${DEPLOY_PATH}/uploads'"
          scp -i ~/.ssh/deploy_key -P "${SERVER_PORT}" app-image.tar.gz "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/app-image.tar.gz"

      - name: Deploy container
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/cuzmall' }}
          APP_PORT: ${{ secrets.APP_PORT || '8023' }}
          IMAGE_TAG: ${{ github.sha }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT || '3306' }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "APP_NAME='${APP_NAME}' IMAGE_NAME='${IMAGE_NAME}' IMAGE_TAG='${IMAGE_TAG}' APP_PORT='${APP_PORT}' DEPLOY_PATH='${DEPLOY_PATH}' DB_HOST='${DB_HOST}' DB_PORT='${DB_PORT}' DB_NAME='${DB_NAME}' DB_USER='${DB_USER}' DB_PASSWORD='${DB_PASSWORD}' bash -s" <<'EOF'
          set -euo pipefail

          cd "${DEPLOY_PATH}"
          docker load -i app-image.tar.gz

          if docker ps -a --format '{{.Names}}' | grep -Fxq "${APP_NAME}"; then
            docker rm -f "${APP_NAME}"
          fi

          RUN_ARGS=(
            -d
            --name "${APP_NAME}"
            --restart always
            -p "${APP_PORT}:8023"
            -v "${DEPLOY_PATH}/uploads:/app/data/uploads"
            -e THYMELEAF_CACHE=true
            -e UPLOAD_DIR=/app/data/uploads
          )

          if [[ -n "${DB_HOST:-}" && -n "${DB_NAME:-}" && -n "${DB_USER:-}" && -n "${DB_PASSWORD:-}" ]]; then
            RUN_ARGS+=(
              -e "DB_HOST=${DB_HOST}"
              -e "DB_PORT=${DB_PORT}"
              -e "DB_NAME=${DB_NAME}"
              -e "DB_USER=${DB_USER}"
              -e "DB_PASSWORD=${DB_PASSWORD}"
            )
          fi

          docker run "${RUN_ARGS[@]}" "${IMAGE_NAME}:${IMAGE_TAG}"

          docker image prune -f
          rm -f app-image.tar.gz
          EOF
