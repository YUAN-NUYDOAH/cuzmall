services:
  mysql:
    image: mysql:8.4
    container_name: cuzmall-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cuzmall
      MYSQL_USER: cuzmall
      MYSQL_PASSWORD: cuzmall
    ports:
      - "3306:3306"
    volumes:
      - cuzmall-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ucuzmall", "-pcuzmall"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cuzmall-mysql-data:
